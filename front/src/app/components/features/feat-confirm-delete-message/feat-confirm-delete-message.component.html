<div class="full-page">

  <div class="full-popup">
      <p>Supprimer ce message ?</p>
      <p>(la suppression d'un message est irréversible)</p>
          <div 
          class="container-button"
          *ngFor="let message of messageListReceived"
          >
              <button (click)="onDeleteMessage()">Oui</button>
              <button (click)="onCancelConfirmationPopup()">Non</button>
          </div>

  </div>

</div>
